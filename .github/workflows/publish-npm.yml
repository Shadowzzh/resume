name: Publish NPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium
          echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - run: npm run build:full
      - name: Prepare npmrc for OIDC publish
        run: |
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          EOF
      - name: Debug npm auth env
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /home/runner/.npmrc
        run: |
          echo "NODE_AUTH_TOKEN=${NODE_AUTH_TOKEN:+SET}"
          echo "NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG:-UNSET}"
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed 's#//registry.npmjs.org/:_authToken=.*#//registry.npmjs.org/:_authToken=[REDACTED]#' "$NPM_CONFIG_USERCONFIG"
          fi
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /home/runner/.npmrc
      - name: Print npm debug logs
        if: failure()
        run: |
          shopt -s nullglob
          for file in /home/runner/.npm/_logs/*-debug-0.log; do
            echo "=== $file ==="
            cat "$file"
          done
      - name: Upload npm debug logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*-debug-0.log
