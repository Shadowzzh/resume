name: Publish NPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium
          echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - run: npm run build:full
      - run: npm publish --provenance
      - name: Print npm debug logs
        if: failure()
        run: |
          shopt -s nullglob
          for file in /home/runner/.npm/_logs/*-debug-0.log; do
            echo "=== $file ==="
            cat "$file"
          done
      - name: Upload npm debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*-debug-0.log
