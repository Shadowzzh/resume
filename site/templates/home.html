<div class="resume-shell">
  <header class="resume-header">
    <div class="header-top">
      <div class="name-area">
        <h1 class="header-name">{{name}}</h1>
      </div>
      <span class="job-title">{{jobTitle}}</span>
    </div>
    <div class="header-summary">
      {{summary}}
    </div>
    <div class="contact-info">
      {{contactStrip}}
    </div>
  </header>

  <section>
    <div class="section-title-v5">核心技术栈</div>
    <div class="tech-list-v5">
      {{skillRows}}
    </div>
  </section>

  <section>
    <div class="section-title-v5">核心项目经历</div>
    <div class="project-list-v5">
      {{projectCards}}
    </div>
  </section>

  <section>
    <div class="section-title-v5">个人优势与认知</div>
    <ul class="point-list-v5 insight-list-v5">
      {{insightList}}
    </ul>
    <div class="footer-links-v5">
      {{footerLinks}}
    </div>
  </section>
</div>
