<section class="hero panel panel-hero">
  <div class="hero-copy">
    <p class="eyebrow">{{eyebrow}}</p>
    <h1>{{name}}</h1>
    <p class="hero-headline">{{headline}}</p>
    <p class="hero-summary">{{summary}}</p>
  </div>
  <aside class="hero-meta">
    <p class="section-kicker">个人概览</p>
    {{heroMeta}}
  </aside>
</section>

<section class="section-block panel">
  <div class="section-heading">
    <p class="section-kicker">01</p>
    <h2>重点项目</h2>
  </div>
  <div class="card-grid project-grid">
    {{selectedWork}}
  </div>
</section>

<section class="section-block panel">
  <div class="section-heading">
    <p class="section-kicker">02</p>
    <h2>技能矩阵</h2>
  </div>
  <div class="card-grid capability-grid">
    {{capabilityMatrix}}
  </div>
</section>

<section class="section-block panel">
  <div class="section-heading">
    <p class="section-kicker">03</p>
    <h2>经历概览</h2>
  </div>
  <div class="timeline-list">
    {{experienceSnapshot}}
  </div>
</section>

<section class="section-block panel panel-dark">
  <div class="section-heading">
    <p class="section-kicker">04</p>
    <h2>访问方式</h2>
  </div>
  <p class="section-summary">{{accessSummary}}</p>
  <div class="command-panel">{{commands}}</div>
</section>

<section class="section-block panel">
  <div class="section-heading">
    <p class="section-kicker">05</p>
    <h2>联系方式</h2>
  </div>
  <div class="contact-grid">
    {{contact}}
  </div>
</section>
