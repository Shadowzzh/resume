<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{pageTitle}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Archivo", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
              mono: ["IBM Plex Mono", "monospace"]
            },
            colors: {
              ink: "#09090b",
              surface: "#fafaf9",
              line: "#e4e4e7",
              accent: "#2563eb"
            }
          }
        }
      };
    </script>
    <style>
      :root {
        --bg: #f3f5f8;
        --surface: #ffffff;
        --surface-muted: #f7f9fc;
        --line: #d7e0ea;
        --text: #0f172a;
        --muted: #475569;
        --accent: #155eef;
        --accent-strong: #0b4bb3;
        --accent-soft: #e8f0ff;
        --panel-dark: #0f172a;
        --panel-dark-line: #233044;
        --panel-dark-text: #e2e8f0;
        --radius-lg: 24px;
        --radius-md: 18px;
        --shadow: 0 18px 36px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "Archivo", "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
        background:
          linear-gradient(180deg, rgba(21, 94, 239, 0.06), transparent 240px),
          linear-gradient(180deg, #fbfcfe 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page-home {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #ffffff;
        color: #334155;
      }

      .page-home .page {
        max-width: 210mm;
        margin: 0 auto;
        padding: 0 15mm 18px;
      }

      .page-home .resume-shell {
        font-size: 11px;
        line-height: 1.4;
        color: #334155;
        text-align: justify;
      }

      .page-home .resume-header {
        margin-bottom: 8px;
        border-bottom: 1.5px solid #0f172a;
        padding-bottom: 6px;
        padding-top: 5px;
      }

      .page-home .header-top {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 6px;
        flex-wrap: wrap;
      }

      .page-home .header-name {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: 2px;
      }

      .page-home .job-title {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 4px;
        background: #eff6ff;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 600;
        color: #2563eb;
      }

      .page-home .header-summary {
        margin-bottom: 6px;
      }

      .page-home .header-summary p {
        margin: 0 0 3px;
        line-height: 1.45;
        color: #334155;
      }

      .page-home .contact-info {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px 14px;
        flex-wrap: wrap;
        font-size: 10.5px;
        color: #334155;
      }

      .page-home .contact-item-v5 {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .page-home .contact-item-v5 svg {
        width: 12px;
        height: 12px;
        fill: #64748b;
        flex: none;
      }

      .page-home .contact-item-v5 a,
      .page-home .contact-item-v5 span {
        color: #334155;
        text-decoration: none;
      }

      .page-home .contact-label-v5 {
        margin-right: 3px;
        color: #64748b;
      }

      .page-home .contact-item-v5 a:hover,
      .page-home .footer-links-v5 a:hover {
        color: #2563eb;
      }

      .page-home .section-title-v5 {
        display: flex;
        align-items: center;
        margin: 10px 0 6px;
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
      }

      .page-home .section-title-v5::before {
        content: "";
        display: inline-block;
        width: 4px;
        height: 13px;
        margin-right: 6px;
        border-radius: 2px;
        background: #2563eb;
      }

      .page-home .tech-list-v5 {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .page-home .tech-item-v5 {
        display: flex;
        align-items: flex-start;
      }

      .page-home .tech-label-v5 {
        flex-shrink: 0;
        width: 86px;
        margin-right: 8px;
        margin-top: 1px;
        border-radius: 4px;
        background: #e2e8f0;
        padding: 2px 6px;
        text-align: center;
        font-size: 10px;
        font-weight: 600;
        color: #475569;
      }

      .page-home .tech-content-v5 {
        flex-grow: 1;
        line-height: 1.45;
        color: #334155;
      }

      .page-home .project-list-v5 {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .page-home .project-card-v5 {
        overflow: hidden;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
      }

      .page-home .project-header-v5 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px dashed #cbd5e1;
        background: #f8fafc;
        padding: 5px 10px;
      }

      .page-home .project-title-v5 {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        font-weight: 600;
        color: #2563eb;
      }

      .page-home .project-title-v5 a {
        color: #2563eb;
        text-decoration: none;
      }

      .page-home .project-title-v5 svg {
        width: 14px;
        height: 14px;
        fill: #2563eb;
        flex: none;
      }

      .page-home .project-meta-v5 {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #64748b;
      }

      .page-home .badge-v5 {
        display: inline-flex;
        align-items: center;
        min-height: 18px;
        border-radius: 4px;
        background: #dcfce7;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 600;
        color: #166534;
      }

      .page-home .badge-v5-neutral {
        background: #e2e8f0;
        color: #475569;
      }

      .page-home .project-body-v5 {
        padding: 6px 10px;
      }

      .page-home .project-tech-v5 {
        margin-bottom: 3px;
        font-size: 11px;
        color: #64748b;
      }

      .page-home .point-list-v5 {
        margin-top: 2px;
        padding-left: 16px;
      }

      .page-home .point-list-v5 li {
        position: relative;
        margin-bottom: 3px;
        line-height: 1.45;
      }

      .page-home .point-list-v5 li:last-child {
        margin-bottom: 0;
      }

      .page-home .point-list-v5 li::marker {
        color: #2563eb;
      }

      .page-home .list-label-v5 {
        font-weight: 600;
        color: #0f172a;
      }

      .page-home .hl-tech {
        font-weight: 600;
        color: #2563eb;
      }

      .page-home .hl-num {
        font-weight: 600;
        color: #059669;
      }

      .page-home .insight-list-v5 {
        color: #334155;
      }

      .page-home .footer-links-v5 {
        margin-top: 8px;
        font-size: 10.5px;
        color: #64748b;
      }

      .page-home .footer-links-v5 a {
        color: #334155;
        text-decoration: none;
      }

      .page-home .footer-separator-v5 {
        margin: 0 6px;
        color: #94a3b8;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        color: var(--accent-strong);
      }

      a:focus-visible {
        outline: 3px solid rgba(21, 94, 239, 0.24);
        outline-offset: 3px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: clamp(2.7rem, 5.5vw, 4.6rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
        margin-bottom: 14px;
      }

      h2 {
        font-size: clamp(1.5rem, 2vw, 1.9rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
        margin-bottom: 0;
      }

      h3 {
        font-size: 1.08rem;
        line-height: 1.3;
        margin-bottom: 8px;
      }

      p,
      li {
        line-height: 1.65;
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 24px 88px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 28px;
        margin-bottom: 20px;
      }

      .panel-hero {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 249, 252, 0.98)),
          var(--surface);
      }

      .panel-dark {
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(17, 24, 39, 0.98));
        border-color: var(--panel-dark-line);
        color: var(--panel-dark-text);
      }

      .hero {
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(0, 1.55fr) minmax(280px, 0.95fr);
        align-items: start;
      }

      .project-hero {
        display: block;
      }

      .hero-copy {
        max-width: 760px;
      }

      .hero-headline {
        font-size: 1.24rem;
        font-weight: 650;
        margin-bottom: 12px;
      }

      .hero-summary,
      .summary-copy p,
      .section-copy p {
        max-width: 62ch;
        color: var(--muted);
      }

      .section-copy-dark p,
      .panel-dark .hero-summary,
      .panel-dark .section-heading-copy p {
        color: rgba(226, 232, 240, 0.84);
      }

      .eyebrow,
      .section-kicker,
      .card-label,
      .card-support,
      .project-meta,
      .timeline-meta,
      .contact-card strong,
      .meta-card strong {
        font-family: "SFMono-Regular", "Menlo", monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.84rem;
        margin-bottom: 16px;
      }

      .section-block,
      .print-section {
        position: relative;
      }

      .section-heading {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 16px;
        align-items: start;
        margin-bottom: 22px;
      }

      .section-kicker {
        color: var(--accent);
        font-size: 0.78rem;
        margin: 6px 0 0;
      }

      .section-heading-copy p {
        margin: 8px 0 0;
        color: var(--muted);
        max-width: 60ch;
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 24px 0 20px;
      }

      .action-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-weight: 600;
        transition:
          transform 180ms ease,
          background-color 180ms ease,
          border-color 180ms ease,
          color 180ms ease;
      }

      .action-link:hover {
        transform: translateY(-1px);
      }

      .action-link-primary {
        background: var(--text);
        color: #ffffff;
      }

      .action-link-primary:hover {
        color: #ffffff;
        background: #1e293b;
      }

      .action-link-secondary {
        border-color: var(--line);
        background: var(--surface);
        color: var(--text);
      }

      .signal-grid,
      .card-grid,
      .contact-grid,
      .resource-grid,
      .project-overview-grid {
        display: grid;
        gap: 14px;
      }

      .signal-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .project-grid {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .capability-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .contact-grid,
      .resource-grid,
      .project-overview-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .hero-meta {
        display: grid;
        gap: 12px;
      }

      .signal-card,
      .project-card,
      .capability-card,
      .timeline-item,
      .contact-card,
      .resource-card,
      .meta-card,
      .resume-item {
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--surface-muted);
        padding: 18px;
      }

      .signal-card {
        background: linear-gradient(180deg, rgba(232, 240, 255, 0.9), rgba(255, 255, 255, 0.98));
      }

      .signal-card strong,
      .resource-card strong {
        display: block;
        margin-bottom: 8px;
      }

      .signal-card p,
      .resource-card p,
      .project-card p,
      .capability-card p,
      .timeline-item p,
      .resume-item p {
        color: var(--muted);
      }

      .meta-card strong,
      .contact-card strong,
      .card-label,
      .card-support,
      .project-meta,
      .timeline-meta {
        display: block;
        font-size: 0.74rem;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .meta-card span {
        display: block;
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .card-support {
        margin-top: 14px;
      }

      .evidence-list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .evidence-item strong {
        display: block;
        font-size: 0.82rem;
        margin-bottom: 4px;
      }

      .evidence-item p,
      .project-link,
      .timeline-links {
        margin-bottom: 0;
      }

      .timeline-list,
      .resume-list {
        display: grid;
        gap: 16px;
      }

      .resume-item + .resume-item {
        margin-top: 0;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        background: #ffffff;
        border-radius: 999px;
        padding: 4px 10px;
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.76rem;
        line-height: 1.4;
      }

      .supplement-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
        gap: 16px;
        margin-top: 16px;
      }

      .command-panel {
        min-height: 100%;
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.88rem;
        background: rgba(2, 6, 23, 0.96);
        color: var(--panel-dark-text);
        border: 1px solid var(--panel-dark-line);
        border-radius: var(--radius-md);
        padding: 18px;
        overflow: auto;
        white-space: pre-wrap;
      }

      .panel-dark .resource-card,
      .panel-dark .contact-card {
        background: rgba(15, 23, 42, 0.42);
        border-color: rgba(148, 163, 184, 0.2);
      }

      .panel-dark .contact-card strong,
      .panel-dark .resource-card p,
      .panel-dark .section-kicker,
      .panel-dark .section-heading-copy p,
      .panel-dark .section-heading h2 {
        color: var(--panel-dark-text);
      }

      .print-header .meta-strip {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 18px;
      }

      .page-project h1 {
        font-size: clamp(2.3rem, 4vw, 3.4rem);
      }

      @media print {
        body {
          background: #ffffff;
        }

        .page {
          max-width: none;
          padding: 24px 24px 0;
        }

        .panel {
          box-shadow: none;
          background: #ffffff;
          break-inside: avoid;
        }

        .panel-dark {
          color: var(--text);
          border-color: var(--line);
          background: #ffffff;
        }

        .panel-dark .section-kicker,
        .panel-dark .section-heading-copy p,
        .panel-dark .section-heading h2,
        .panel-dark .resource-card p,
        .panel-dark .contact-card strong {
          color: var(--text);
        }

        .command-panel {
          background: #ffffff;
          color: var(--text);
          border-color: var(--line);
        }
      }

      @media (max-width: 820px) {
        .hero,
        .supplement-grid {
          grid-template-columns: 1fr;
        }

        .hero-meta {
          order: -1;
        }
      }

      @media (max-width: 760px) {
        .page {
          padding-inline: 16px;
        }

        .panel {
          padding: 22px;
        }

        .section-heading {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .section-kicker {
          margin-top: 0;
        }
      }

      @media (max-width: 720px) {
        .page-home .page {
          padding-inline: 16px;
        }

        .page-home .contact-info {
          justify-content: flex-start;
        }

        .page-home .tech-item-v5 {
          flex-direction: column;
          gap: 6px;
        }

        .page-home .tech-label-v5 {
          width: auto;
          margin-right: 0;
          padding-inline: 8px;
        }

        .page-home .project-header-v5 {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body class="{{bodyClass}} antialiased">
    <main class="page">
      {{content}}
    </main>
  </body>
</html>
