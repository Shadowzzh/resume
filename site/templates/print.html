<section class="print-header panel">
  <p class="eyebrow">{{eyebrow}}</p>
  <h1>{{name}}</h1>
  <p class="hero-headline">{{headline}}</p>
  <div class="meta-strip">
    {{heroMeta}}
  </div>
</section>

<section class="print-section panel">
  <div class="section-heading">
    <p class="section-kicker">01</p>
    <h2>个人简介</h2>
  </div>
  <div class="summary-copy">
    {{summary}}
  </div>
</section>

<section class="print-section panel">
  <div class="section-heading">
    <p class="section-kicker">02</p>
    <h2>工作经历</h2>
  </div>
  <div class="resume-list">
    {{experience}}
  </div>
</section>

<section class="print-section panel">
  <div class="section-heading">
    <p class="section-kicker">03</p>
    <h2>项目经验</h2>
  </div>
  <div class="resume-list">
    {{projects}}
  </div>
</section>

<section class="print-section panel">
  <div class="section-heading">
    <p class="section-kicker">04</p>
    <h2>专业技能</h2>
  </div>
  <div class="resume-list">
    {{skills}}
  </div>
</section>

<section class="print-section panel">
  <div class="section-heading">
    <p class="section-kicker">05</p>
    <h2>联系方式</h2>
  </div>
  <div class="contact-grid">
    {{contact}}
  </div>
</section>
